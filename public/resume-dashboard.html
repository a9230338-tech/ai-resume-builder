<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium AI Resume Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Small overrides if needed, but we mostly use style.css now to unify design */
    #resumePreview {
        white-space: pre-line;
    }
  </style>
</head>
<body>

  <header>
    <h1>AI Dashboard</h1>
    <p>Premium Resume Generator Using AI</p>
  </header>

  <div class="container main-container">
    
    <div class="form-section form-panel">
      <h2>Enter Your Details</h2>

      <label for="name">Full Name</label>
      <input id="name" type="text" placeholder="John Doe">
      
      <label for="job">Target Job</label>
      <input id="job" type="text" placeholder="Software Engineer">
      
      <label for="skills">Skills</label>
      <textarea id="skills" placeholder="List your key skills"></textarea>
      
      <label for="education">Education</label>
      <textarea id="education" placeholder="Your educational background"></textarea>
      
      <label for="experience">Experience</label>
      <textarea id="experience" placeholder="Past work experience"></textarea>
      
      <button onclick="generateResume()">
        ✨ Auto-Generate Resume
      </button>

    </div>

    <div class="preview-section preview-panel">
      <div class="preview-section-inner" style="width:100%; max-width:800px;">
        <h2>AI Draft Output</h2>
        <div id="resumePreview" class="template1" style="color: #475569;">
          Your AI-generated text will appear here...
        </div>
      </div>
    </div>

  </div>

  <script>
    async function generateResume(){
      const data={
        name:document.getElementById("name").value,
        skills:document.getElementById("skills").value,
        education:document.getElementById("education").value,
        experience:document.getElementById("experience").value,
        job:document.getElementById("job").value
      }

      // Add loading state
      document.getElementById("resumePreview").innerText = "Generating your perfect resume with AI...";
      
      try {
        const res=await fetch("http://localhost:3000/generate-resume",{
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify(data)
        })

        if (!res.ok) throw new Error("Request failed");

        const result=await res.json()
        const formatted = `${result.name}\n${result.job}\n\nSUMMARY\n${result.summary}\n\nSKILLS\n${result.skills}\n\nEDUCATION\n${result.education}\n\nEXPERIENCE\n${result.experience}`;
        document.getElementById("resumePreview").innerText=formatted;
      } catch (err) {
        document.getElementById("resumePreview").innerText = "AI Generation Failed. Please ensure the backend is running at localhost:3000.";
      }
    }
  </script>

</body>
</html>
